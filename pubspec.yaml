name: project_zion
description: Zion OS - نظام تشغيل للاختراق
version: 4.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  provider: ^6.1.1
  font_awesome_flutter: ^10.6.0
  google_fonts: ^6.1.0
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Network
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  network_info_plus: ^4.0.0
  
  # Security
  crypto: ^3.0.3
  permission_handler: ^11.0.1
  
  # Device
  device_info_plus: ^9.1.0
  battery_plus: ^5.0.0
  
  # Charts
  fl_chart: ^0.68.0
  
  # WebView
  webview_flutter: ^4.4.0
  
  # Utils
  url_launcher: ^6.2.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/svg/
    - assets/images/
    - assets/fonts/
