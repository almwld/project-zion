name: project_zion
description: Zion OS - نظام تشغيل للاختراق
version: 3.1.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.0
  network_info_plus: ^5.0.0
  flutter_secure_storage: ^9.2.0
  crypto: ^3.0.4
  http: ^1.2.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  webview_flutter: ^4.4.0
  file_picker: ^6.1.1
  local_auth: ^2.1.7
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

  camera: ^0.10.5
  image_picker: ^1.0.5
