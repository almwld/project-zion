name: project_zion
description: Zion OS - Professional Penetration Testing Platform
version: 4.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # UI & Icons
  font_awesome_flutter: ^10.6.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  animations: ^2.0.7
  lottie: ^2.7.0
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Security
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.6
  
  # Network
  http: ^1.1.0
  dio: ^5.3.4
  connectivity_plus: ^5.0.2
  network_info_plus: ^4.0.0
  webview_flutter: ^4.4.0
  
  # Device Info
  device_info_plus: ^9.1.0
  battery_plus: ^5.0.0
  permission_handler: ^11.0.1
  
  # Charts
  fl_chart: ^0.68.0
  
  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/svg/
    - assets/images/
    - assets/fonts/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

  local_auth: ^2.1.6

  flutter_local_notifications: ^16.3.0

  mobile_scanner: ^4.0.1
  qr_flutter: ^4.1.0

  video_player: ^2.8.1
