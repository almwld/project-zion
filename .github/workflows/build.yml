name: Build Project Zion APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Create missing asset directories
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts
          touch assets/images/.gitkeep
          touch assets/fonts/.gitkeep
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons:main
      
      - name: 🔨 Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi
      
      - name: 📤 Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: project-zion-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
      
      - name: 📤 Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: project-zion-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
      
      - name: 📤 Upload x86
        uses: actions/upload-artifact@v4
        with:
          name: project-zion-x86
          path: build/app/outputs/flutter-apk/app-x86-release.apk
          retention-days: 30
      
      - name: 📤 Upload x86_64
        uses: actions/upload-artifact@v4
        with:
          name: project-zion-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
      
      - name: 📤 Upload universal
        uses: actions/upload-artifact@v4
        with:
          name: project-zion-universal
          path: build/app/outputs/flutter-apk/app-universal-release.apk
          retention-days: 30
